version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: atomcap-postgres
    environment:
      POSTGRES_USER: atomcap
      POSTGRES_PASSWORD: atomcap123
      POSTGRES_DB: atomcap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atomcap -d atomcap"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: